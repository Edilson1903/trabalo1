<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Entry</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>Update_Record</h1>
      <form action="/atualizar/{{ cliente[0] }}" method="POST">
        <input type="text" name="nome" value="{{ cliente[1] }}" required />
        <input type="email" name="email" value="{{ cliente[2] }}" required />
        <input type="text" name="telefone" value="{{ cliente[3] }}" />
        <button type="submit">Commit Changes</button>
      </form>
      <a href="/" class="link-voltar">← Return to Dashboard</a>
    </div>
  </body>
</html>
